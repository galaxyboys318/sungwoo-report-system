<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>주간보고</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Malgun Gothic',sans-serif;background:#f5f6fa;color:#1a1a2e;}
.topbar{background:#1a73e8;display:flex;align-items:center;gap:18px;padding:0 24px;height:52px;position:sticky;top:0;z-index:100;}
.topbar-title{color:#fff;font-size:clamp(14px, 0.99vw, 21px);font-weight:600;}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:10px;}
.topbar-user{color:rgba(255,255,255,0.8);font-size:clamp(12px, 0.83vw, 18px);}
.btn-topbar{background:rgba(255,255,255,0.15);color:#fff;border:none;padding:6px 12px;border-radius:6px;font-size:clamp(11px, 0.78vw, 16px);cursor:pointer;font-family:inherit;}
.btn-topbar:hover{background:rgba(255,255,255,0.25);}
.wrap{max-width:960px;margin:0 auto;padding:24px 16px 48px;}
.section-title{font-size:clamp(16px, 1.09vw, 23px);font-weight:600;color:#1a1a2e;margin:0 0 14px;}
.card{background:#fff;border-radius:12px;border:0.5px solid #e8e8e8;padding:20px 24px;margin-bottom:18px;}

/* 요약 카드 */
.summary-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:25px;}
.summary-item{background:#fff;border-radius:10px;border:0.5px solid #e8e8e8;padding:20px;text-align:center;}
.summary-label{font-size:clamp(10px, 0.73vw, 15px);color:#888;margin-bottom:8px;}
.summary-value{font-size:clamp(26px, 1.82vw, 38px);font-weight:600;}
.summary-unit{font-size:clamp(10px, 0.73vw, 15px);color:#aaa;margin-top:3px;}
.v-blue{color:#1a73e8;} .v-green{color:#34a853;} .v-orange{color:#e67e22;}

/* 프로젝트 카드 */
.project-card{background:#f8fbff;border-radius:10px;border:1.5px solid #c8d8f8;padding:14px 18px;margin-bottom:12px;}
.project-header{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
.project-name{font-size:clamp(14px, 0.94vw, 20px);font-weight:600;color:#1a1a2e;}
.tag{font-size:clamp(10px, 0.62vw, 13px);padding:2px 7px;border-radius:20px;font-weight:500;background:#e8f0fe;color:#1558b0;}
.task-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;}
.task-name{font-size:clamp(11px, 0.78vw, 16px);color:#444;}
.task-dates{font-size:clamp(10px, 0.62vw, 13px);color:#aaa;margin-left:6px;}
.task-pct{font-size:clamp(11px, 0.78vw, 16px);font-weight:500;color:#3498db;}
.bar-bg{background:#e0e0e0;border-radius:20px;height:5px;overflow:hidden;margin-bottom:10px;}
.bar-fill{height:5px;border-radius:20px;background:#3498db;}

/* AI 요약 */
.ai-box{width:100%;background:#f8f9fa;border-radius:8px;border:0.5px solid #e8e8e8;padding:16px 18px;font-size:clamp(12px, 0.83vw, 18px);line-height:2.3;color:#222;min-height:120px;resize:vertical;font-family:inherit;outline:none;box-sizing:border-box;}
    .ai-box:focus{border-color:#1a73e8;background:#fff;}
    .ai-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:15px;}
    .ai-hint{font-size:clamp(10px, 0.73vw, 15px);color:#aaa;}
.ai-loading{color:#aaa;display:flex;align-items:center;gap:10px;font-size:clamp(12px, 0.83vw, 18px);}
.ai-dot{width:6px;height:6px;border-radius:50%;background:#1a73e8;animation:blink 1s infinite;}
.ai-dot:nth-child(2){animation-delay:0.2s;}
.ai-dot:nth-child(3){animation-delay:0.4s;}
@keyframes blink{0%,100%{opacity:0.2;}50%{opacity:1;}}

/* 일자별 내역 */
.day-row{padding:12px 0;border-bottom:0.5px solid #f0f0f0;}
.day-row:last-child{border-bottom:none;}
.day-date{font-size:clamp(11px, 0.78vw, 16px);font-weight:600;color:#1a73e8;margin-bottom:5px;}
.day-body{font-size:clamp(11px, 0.78vw, 16px);color:#444;line-height:2.2;white-space:pre-line;}
.day-tasks{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px;}
.day-task-badge{font-size:clamp(10px, 0.62vw, 13px);background:#e8f0fe;color:#1558b0;padding:2px 8px;border-radius:20px;}

/* 빈 상태 */
.empty{text-align:center;padding:48px 0;color:#bbb;font-size:clamp(12px, 0.83vw, 18px);}

/* 발송 버튼 */
.send-btn{width:100%;padding:18px;background:#1a73e8;color:#fff;font-size:clamp(14px, 0.99vw, 21px);font-weight:600;border:none;border-radius:10px;cursor:pointer;font-family:inherit;transition:background 0.15s;}
.send-btn:hover{background:#1558b0;}
.send-btn:disabled{background:#ccc;cursor:not-allowed;}
.send-hint{font-size:clamp(11px, 0.78vw, 16px);color:#aaa;text-align:center;margin-top:8px;}

.history-item{padding:14px 0;border-bottom:0.5px solid #f0f0f0;display:flex;align-items:flex-start;gap:15px;}
.history-item:last-child{border-bottom:none;}
.history-meta{flex:1;min-width:0;}
.history-week{font-size:clamp(12px, 0.83vw, 18px);font-weight:600;color:#1a1a2e;margin-bottom:4px;}
.history-date{font-size:clamp(10px, 0.73vw, 15px);color:#aaa;}
.history-to{font-size:clamp(10px, 0.73vw, 15px);color:#888;margin-top:3px;}
.history-summary{font-size:clamp(11px, 0.78vw, 16px);color:#666;margin-top:5px;line-height:1.9;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.del-btn{flex-shrink:0;padding:6px 12px;background:none;border:1px solid #e74c3c;color:#e74c3c;border-radius:6px;font-size:clamp(11px, 0.78vw, 16px);cursor:pointer;font-family:inherit;}
.del-btn:hover{background:#fef2f2;}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px 20px;border-radius:8px;font-size:clamp(12px, 0.83vw, 18px);display:none;z-index:999;}
.recipient-list{display:flex;flex-direction:column;gap:10px;margin-bottom:20px;}
.recipient-item{display:flex;align-items:center;gap:12px;padding:10px 14px;background:#f8f9fa;border-radius:8px;border:0.5px solid #e8e8e8;cursor:pointer;}
.recipient-item:hover{background:#f0f4ff;}
.recipient-item input[type=checkbox]{width:16px;height:16px;accent-color:#1a73e8;cursor:pointer;flex-shrink:0;}
.recipient-name{font-size:clamp(12px, 0.83vw, 18px);font-weight:500;color:#1a1a2e;flex:1;}
.recipient-email{font-size:clamp(10px, 0.73vw, 15px);color:#aaa;}
.recipient-pos{font-size:clamp(10px, 0.73vw, 15px);color:#888;margin-left:auto;}
.warning-box{background:#fff8e1;border:1px solid #ffe082;border-radius:8px;padding:14px 16px;margin-bottom:20px;display:flex;gap:12px;align-items:flex-start;}
.warning-icon{font-size:clamp(19px, 1.3vw, 28px);flex-shrink:0;line-height:1.2;}
.warning-text{font-size:clamp(12px, 0.83vw, 18px);color:#7b5e00;line-height:2.0;}
.warning-text strong{display:block;margin-bottom:5px;font-size:clamp(14px, 0.94vw, 20px);}
</style>
</head>
<body>
<div class="topbar">
  <span class="topbar-title">📋 주간보고</span>
  <div class="topbar-right">
    <span class="topbar-user" id="topbar-user"></span>
    <button class="btn-topbar" onclick="location.href='/report'">← 보고 폼</button>
    <button class="btn-topbar" onclick="logout()">로그아웃</button>
  </div>
</div>

<div class="wrap">
  <div id="main-content">
    <div class="empty"><div class="ai-loading" style="justify-content:center;"><div class="ai-dot"></div><div class="ai-dot"></div><div class="ai-dot"></div><span style="margin-left:6px;">주간 데이터 불러오는 중...</span></div></div>
  </div>
</div>
<div id="history-section"></div>

<div class="toast" id="toast"></div>

<script>
const dayNames = ['일','월','화','수','목','금','토'];
let weeklyData = null;
let aiSummary = '';
let currentUser = null;

function fmt(d) { const [y,m,dd] = d.split('-'); return `${y}.${m}.${dd}`; }
function fmtDay(d) { const dt = new Date(d+'T00:00:00'); return `${fmt(d)} (${dayNames[dt.getDay()]})`; }

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 2500);
}

async function init() {
  const res = await fetch('/api/me');
  const data = await res.json();
  if (!data.user) { location.href = '/login'; return; }
  currentUser = data.user;
  document.getElementById('topbar-user').textContent = `${currentUser.name} (${currentUser.position || '팀원'})`;
  await loadWeeklyData();
  await loadHistory();
}

async function loadHistory() {
  const res = await fetch('/api/weekly-list');
  const data = await res.json();
  const records = data.records || [];

  const section = document.getElementById('history-section');
  if (!section) return;

  if (records.length === 0) {
    section.innerHTML = `<div class="card"><div class="section-title" style="margin-bottom:12px;">📂 주간보고 발송 내역</div><div style="font-size:clamp(12px, 0.83vw, 18px);color:#bbb;text-align:center;padding:20px 0;">발송 내역이 없습니다.</div></div>`;
    return;
  }

  const fmt = d => { const [y,m,dd] = d.split('-'); return `${y}.${m}.${dd}`; };
  const rows = records.map(r => {
    const sentAt = r.sentAt ? new Date(r.sentAt).toLocaleString('ko-KR', {timeZone:'Asia/Seoul'}) : '-';
    const to = (r.sentTo || []).join(', ');
    const summary = (r.aiSummary || '').replace(/\n/g, ' ').slice(0, 100);
    return `<div class="history-item">
      <div class="history-meta">
        <div class="history-week">${r.weekKey} &nbsp;(${fmt(r.weekStart)} ~ ${fmt(r.weekEnd)})</div>
        <div class="history-date">발송일시: ${sentAt}</div>
        <div class="history-to">수신: ${to}</div>
        ${summary ? `<div class="history-summary">${summary}${r.aiSummary?.length > 100 ? '...' : ''}</div>` : ''}
      </div>
      <button class="del-btn" onclick="deleteWeekly('${r.fileName}', '${r.weekKey}')">삭제</button>
    </div>`;
  }).join('');

  section.innerHTML = `
    <div class="card">
      <div class="section-title" style="margin-bottom:5px;">📂 주간보고 발송 내역</div>
      <div style="font-size:clamp(10px, 0.73vw, 15px);color:#aaa;margin-bottom:18px;">삭제 시 이메일은 취소되지 않으며 분기보고 집계에서만 제외됩니다.</div>
      ${rows}
    </div>`;
}

async function deleteWeekly(fileName, weekKey) {
  if (!confirm(`[${weekKey}] 주간보고 기록을 삭제하시겠습니까?

⚠️ 이미 발송된 이메일은 취소되지 않습니다.
삭제 시 분기보고 집계에서 제외됩니다.`)) return;
  const res = await fetch(`/api/weekly-delete/${encodeURIComponent(fileName)}`, { method: 'DELETE' });
  if (res.ok) {
    showToast('✅ 발송 내역이 삭제되었습니다.');
    await loadHistory();
  } else {
    const err = await res.json();
    alert('삭제 실패: ' + err.error);
  }
}

async function loadWeeklyData() {
  try {
    const res = await fetch('/api/weekly-data');
    if (!res.ok) {
      const err = await res.json().catch(() => ({ error: res.statusText }));
      document.getElementById('main-content').innerHTML = `<div class="card"><div class="empty" style="color:#e74c3c;">❌ 데이터 로딩 실패 (${res.status}): ${err.error || res.statusText}</div></div>`;
      return;
    }
    const data = await res.json();
    weeklyData = data;
    renderPage();
    if (data.weeklyDays && data.weeklyDays.length > 0) generateAiSummary();
  } catch (e) {
    document.getElementById('main-content').innerHTML = `<div class="card"><div class="empty" style="color:#e74c3c;">❌ 오류 발생: ${e.message}</div></div>`;
  }
}

// 프로젝트별 집계
function aggregateProjects(weeklyDays) {
  const map = {};
  weeklyDays.forEach(day => {
    day.entries.forEach(entry => {
      (entry.checkedTasks || []).forEach(task => {
        if (!map[task.projectName]) map[task.projectName] = { tag: task.projectTag || '', tasks: {} };
        if (!map[task.projectName].tasks[task.taskName]) {
          map[task.projectName].tasks[task.taskName] = { dates: [], finalPct: 0 };
        }
        map[task.projectName].tasks[task.taskName].dates.push(day.date);
        map[task.projectName].tasks[task.taskName].finalPct = task.taskProgress || 0;
      });
    });
  });
  return map;
}

function renderPage() {
  const { weeklyDays, weekStart, weekEnd } = weeklyData;
  const container = document.getElementById('main-content');

  if (!weeklyDays || weeklyDays.length === 0) {
    container.innerHTML = `
      <div class="card">
        <div class="section-title" style="margin-bottom:5px;">📅 ${fmt(weekStart)} ~ ${fmt(weekEnd)}</div>
        <p style="font-size:clamp(11px, 0.78vw, 16px);color:#aaa;margin-bottom:0;">이번 주 보고 내역이 없습니다.</p>
      </div>`;
    return;
  }

  const projectMap = aggregateProjects(weeklyDays);
  const totalTasks = weeklyDays.reduce((s,d) => s + d.entries.reduce((ss,e) => ss + (e.checkedTasks?.length || 0), 0), 0);

  // 요약 카드
  const summaryHtml = `
    <div class="card" style="margin-bottom:18px;">
      <div class="section-title" style="margin-bottom:18px;">📅 ${fmt(weekStart)} ~ ${fmt(weekEnd)} 주간보고</div>
      <div class="summary-grid">
        <div class="summary-item"><div class="summary-label">보고 일수</div><div class="summary-value v-blue">${weeklyDays.length}</div><div class="summary-unit">일</div></div>
        <div class="summary-item"><div class="summary-label">총 업무</div><div class="summary-value v-green">${totalTasks}</div><div class="summary-unit">건</div></div>
        <div class="summary-item"><div class="summary-label">관여 프로젝트</div><div class="summary-value v-orange">${Object.keys(projectMap).length}</div><div class="summary-unit">개</div></div>
      </div>
    </div>`;

  // 프로젝트 카드 (checkedTasks 있을 때만)
  let projectsHtml = '';
  if (Object.keys(projectMap).length > 0) {
    const cards = Object.entries(projectMap).map(([pName, pData]) => {
      const taskRows = Object.entries(pData.tasks).map(([tName, tData]) => `
        <div class="task-row">
          <span class="task-name">${tName}<span class="task-dates">${tData.dates.map(fmtDay).join(', ')}</span></span>
          <span class="task-pct">${tData.finalPct}%</span>
        </div>
        <div class="bar-bg"><div class="bar-fill" style="width:${tData.finalPct}%"></div></div>`).join('');
      return `<div class="project-card">
        <div class="project-header"><span class="project-name">${pName}</span><span class="tag">${pData.tag}</span></div>
        ${taskRows}
      </div>`;
    }).join('');
    projectsHtml = `<div class="card"><div class="section-title">프로젝트별 진행 현황</div>${cards}</div>`;
  }

  // AI 요약 영역
  const aiHtml = `
    <div class="card">
      <div class="section-title" style="margin-bottom:15px;">✨ AI 주간 요약</div>
      <div class="ai-header">
        <span style="font-size:clamp(10px, 0.73vw, 15px);color:#1a73e8;">✨ AI가 작성한 초안입니다. 직접 수정 후 발송하세요.</span>
        <span class="ai-hint" id="ai-status">요약 생성 중...</span>
      </div>
      <textarea class="ai-box" id="ai-summary-box" placeholder="AI 요약이 생성되면 여기에 표시됩니다. 내용을 직접 수정할 수 있어요."></textarea>
    </div>`;

  // 일자별 내역
  const dayRows = weeklyDays.map(day => {
    const taskBadges = [...new Set(day.entries.flatMap(e => (e.checkedTasks || []).map(t => t.taskName)))]
      .map(t => `<span class="day-task-badge">${t}</span>`).join('');
    const body = day.entries.map(e => e.body).join('\n\n');
    return `<div class="day-row">
      <div class="day-date">${fmtDay(day.date)}</div>
      ${taskBadges ? `<div class="day-tasks">${taskBadges}</div>` : ''}
      <div class="day-body">${body}</div>
    </div>`;
  }).join('');
  const dayHtml = `<div class="card"><div class="section-title">일자별 상세 내역</div>${dayRows}</div>`;

  // 발송 영역 — 수신자 목록은 비동기로 렌더링
  const sendHtml = `
    <div class="card">
      <div class="section-title" style="margin-bottom:18px;">📨 발송 설정</div>

      <div class="warning-box">
        <span class="warning-icon">⚠️</span>
        <div class="warning-text">
          <strong>발송 전 반드시 확인하세요</strong>
          발송된 보고서는 취소할 수 없습니다.<br>
          AI 요약 내용을 위에서 최종 검토한 후 발송해주세요.<br>
          발송 후 이번 주 메모 히스토리가 초기화됩니다.
        </div>
      </div>

      <div style="font-size:clamp(12px, 0.83vw, 18px);font-weight:500;color:#1a1a2e;margin-bottom:12px;">수신자 선택</div>
      <div class="recipient-list" id="recipient-list">
        <div style="font-size:clamp(12px, 0.83vw, 18px);color:#aaa;">수신자 목록 불러오는 중...</div>
      </div>

      <button class="send-btn" id="send-btn" onclick="sendWeekly()">📨 주간보고 발송</button>
      <div class="send-hint" id="send-hint">수신자를 1명 이상 선택해야 발송됩니다.</div>
    </div>`;

  container.innerHTML = summaryHtml + projectsHtml + aiHtml + dayHtml + sendHtml;
  loadRecipients();
}

async function generateAiSummary() {
  const { weeklyDays, weekStart, weekEnd } = weeklyData;
  const allBodies = weeklyDays.map(d => `[${fmtDay(d.date)}]\n${d.entries.map(e => e.body).join('\n')}`).join('\n\n');

  // 단계별 실제 수량/비율 데이터 구조화
  const stepSummary = [];
  weeklyDays.forEach(day => {
    day.entries.forEach(entry => {
      (entry.checkedTasks || []).forEach(task => {
        (task.steps || []).forEach(s => {
          let progress = '';
          if (s.type === 'check') progress = s.done ? '완료' : '미완';
          else if (s.type === 'qty') progress = `${s.current}/${s.target}개`;
          else if (s.type === 'pct') progress = `${s.pct}%`;
          stepSummary.push(`[${fmtDay(day.date)}] ${task.projectName} > ${task.taskName} > ${s.name}: ${progress}${s.memo ? ' / ' + s.memo : ''}`);
        });
      });
    });
  });

  try {
    const res = await fetch('/api/gpt-weekly', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ weekStart, weekEnd, bodies: allBodies, stepSummary, user: currentUser }),
    });
    const data = await res.json();
    aiSummary = data.summary || '';
    const box = document.getElementById('ai-summary-box');
    if (box) box.value = aiSummary;
    const status = document.getElementById('ai-status');
    if (status) status.textContent = '✅ 생성 완료 — 내용을 수정할 수 있습니다.';
  } catch (e) {
    const box = document.getElementById('ai-summary-box');
    if (box) box.value = '';
    const status = document.getElementById('ai-status');
    if (status) status.textContent = '⚠️ 생성 실패 — 직접 입력해주세요.';
  }
}

async function loadRecipients() {
  const res = await fetch('/api/recipients');
  const data = await res.json();
  const list = document.getElementById('recipient-list');
  if (!list) return;
  if (!data.recipients || data.recipients.length === 0) {
    list.innerHTML = '<div style="font-size:clamp(12px, 0.83vw, 18px);color:#aaa;">수신 가능한 상급자가 없습니다.</div>';
    return;
  }
  list.innerHTML = data.recipients.map(r => `
    <label class="recipient-item">
      <input type="checkbox" class="recipient-chk" value="${r.email}" checked>
      <span class="recipient-name">${r.name}</span>
      <span class="recipient-pos">${r.position || r.role || ''}</span>
      ${r.level === 1 ? '<span style="font-size:clamp(10px, 0.62vw, 13px);background:#e8f0fe;color:#1558b0;padding:1px 7px;border-radius:20px;font-weight:500;">경영진</span>' : ''}
      <span class="recipient-email">${r.email}</span>
    </label>`).join('');
}

async function sendWeekly() {
  // 선택된 수신자 수집
  const checked = [...document.querySelectorAll('.recipient-chk:checked')].map(el => el.value);
  if (checked.length === 0) {
    alert('수신자를 1명 이상 선택해주세요.');
    return;
  }

  // 최종 확인 경고
  const confirmed = confirm(
    `주간보고를 발송하시겠습니까?

` +
    `수신자: ${checked.length}명
` +
    `기간: ${weeklyData.weekStart} ~ ${weeklyData.weekEnd}

` +
    `⚠️ 발송 후에는 취소할 수 없으며,
이번 주 메모 히스토리가 초기화됩니다.`
  );
  if (!confirmed) return;

  const btn = document.getElementById('send-btn');
  btn.disabled = true;
  btn.textContent = '발송 중...';

  try {
    const res = await fetch('/api/weekly-send', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        weekStart: weeklyData.weekStart,
        weekEnd: weeklyData.weekEnd,
        weeklyDays: weeklyData.weeklyDays,
        aiSummary: document.getElementById('ai-summary-box')?.value || aiSummary,
        recipients: checked,
      }),
    });
    if (res.ok) {
      showToast('✅ 주간보고가 발송되었습니다!');
      btn.textContent = '✅ 발송 완료';
    } else {
      const err = await res.json();
      alert('발송 실패: ' + err.error);
      btn.disabled = false;
      btn.textContent = '📨 주간보고 발송';
    }
  } catch (e) {
    alert('발송 중 오류가 발생했습니다.');
    btn.disabled = false;
    btn.textContent = '📨 주간보고 발송';
  }
}

function logout() { fetch('/logout', { method: 'POST' }).then(() => location.href = '/login'); }

init();
</script>
