<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>관리자 · 일일보고</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Malgun Gothic', sans-serif; background: #f4f6f9; min-height: 100vh; }

    /* 탑바 */
    .topbar { background: #1a73e8; padding: 0 24px; display: flex; align-items: center; gap: 0; height: 52px; }
    .topbar-title { color: #fff; font-size: 15px; font-weight: 700; margin-right: 32px; }
    .tab { color: rgba(255,255,255,0.7); font-size: 13px; font-weight: 600; padding: 0 16px; height: 52px; display: flex; align-items: center; cursor: pointer; border-bottom: 3px solid transparent; transition: all 0.15s; }
    .tab:hover { color: #fff; }
    .tab.active { color: #fff; border-bottom-color: #fff; }
    .topbar-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }
    .topbar-user { color: rgba(255,255,255,0.8); font-size: 13px; }
    .btn-topbar { color: #fff; background: rgba(255,255,255,0.15); border: none; border-radius: 5px; padding: 5px 12px; font-size: 12px; cursor: pointer; }
    .btn-topbar:hover { background: rgba(255,255,255,0.25); }

    .page { display: none; padding: 24px; max-width: 820px; margin: 0 auto; }
    .page.active { display: block; }

    /* 카드 */
    .card { background: #fff; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.07); margin-bottom: 16px; overflow: hidden; }
    .card-header { display: flex; align-items: center; gap: 10px; padding: 16px 20px; border-bottom: 1px solid #f0f0f0; cursor: pointer; }
    .card-header:hover { background: #fafafa; }
    .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .card-title { flex: 1; }
    .card-name { font-size: 15px; font-weight: 700; color: #1a1a1a; }
    .card-meta { font-size: 12px; color: #888; margin-top: 2px; }
    .badge { font-size: 11px; padding: 2px 8px; border-radius: 20px; font-weight: 600; }
    .progress-text { font-size: 12px; color: #1a73e8; font-weight: 700; min-width: 36px; text-align: right; }
    .arrow { font-size: 12px; color: #aaa; transition: transform 0.2s; }
    .arrow.open { transform: rotate(90deg); }

    /* 프로젝트 바디 */
    .card-body { display: none; padding: 16px 20px; border-bottom: 1px solid #f0f0f0; }
    .card-body.open { display: block; }
    .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
    .field { display: flex; flex-direction: column; gap: 4px; }
    .field-label { font-size: 11px; color: #888; font-weight: 700; }
    .field-input { border: 1.5px solid #e0e0e0; border-radius: 6px; padding: 7px 10px; font-size: 13px; font-family: inherit; color: #333; }
    .field-input:focus { outline: none; border-color: #1a73e8; }
    .action-row { display: flex; gap: 8px; justify-content: flex-end; margin-top: 8px; }
    .btn { padding: 7px 16px; border: none; border-radius: 6px; font-size: 13px; font-weight: 700; cursor: pointer; }
    .btn-blue { background: #1a73e8; color: #fff; }
    .btn-blue:hover { background: #1558b0; }
    .btn-red { background: none; color: #e53935; border: 1px solid #e53935; }
    .btn-red:hover { background: #fce8e6; }
    .btn-green { background: #34a853; color: #fff; }
    .btn-green:hover { background: #2d8f47; }
    .btn-gray { background: #f0f0f0; color: #555; }
    .btn-gray:hover { background: #e0e0e0; }

    /* 단위업무 */
    .task-section { padding: 0 20px 12px; }
    .section-title { font-size: 12px; font-weight: 700; color: #555; padding: 12px 0 8px; letter-spacing: 0.3px; }
    .task-block { border: 1.5px solid #e8e8e8; border-radius: 8px; margin-bottom: 8px; overflow: hidden; }
    .task-block-header { display: flex; align-items: center; gap: 8px; padding: 10px 14px; background: #fafafa; cursor: pointer; border-bottom: 1px solid #e8e8e8; }
    .task-block-header:hover { background: #f0f0f0; }
    .task-block-name { flex: 1; font-size: 14px; font-weight: 600; color: #333; }
    .task-assignees { font-size: 11px; color: #888; }
    .task-progress { font-size: 12px; color: #1a73e8; font-weight: 600; }
    .btn-sm { font-size: 11px; color: #aaa; background: none; border: none; cursor: pointer; padding: 2px 6px; border-radius: 4px; }
    .btn-sm:hover { color: #e53935; background: #fce8e6; }
    .task-arrow { font-size: 11px; color: #aaa; transition: transform 0.2s; }
    .task-arrow.open { transform: rotate(90deg); }

    .task-body { display: none; padding: 10px 14px; }
    .task-body.open { display: block; }

    /* 담당자 태그 입력 */
    .assignee-wrap { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; margin-bottom: 8px; }
    .assignee-tag { display: flex; align-items: center; gap: 4px; background: #e8f0fe; color: #1a73e8; font-size: 12px; padding: 3px 8px; border-radius: 20px; font-weight: 600; }
    .assignee-tag .remove { cursor: pointer; font-size: 13px; color: #aac4f0; font-weight: 400; }
    .assignee-tag .remove:hover { color: #e53935; }
    .assignee-add-wrap { display: flex; gap: 6px; align-items: center; }
    .assignee-select { border: 1.5px solid #e0e0e0; border-radius: 6px; padding: 5px 8px; font-size: 12px; font-family: inherit; color: #333; background: #fff; }
    .assignee-select:focus { outline: none; border-color: #1a73e8; }
    .btn-assignee-add { padding: 5px 10px; background: #e8f0fe; color: #1a73e8; border: none; border-radius: 6px; font-size: 12px; font-weight: 700; cursor: pointer; }
    .btn-assignee-add:hover { background: #c5d8fb; }

    /* 단계 목록 */
    .step-list { margin-top: 8px; }
    .step-row { display: flex; align-items: center; gap: 8px; padding: 7px 0; border-top: 1px solid #f0f0f0; }
    .step-type-badge { font-size: 10px; padding: 2px 6px; border-radius: 4px; font-weight: 700; white-space: nowrap; }
    .type-check { background: #e8f0fe; color: #1a73e8; }
    .type-qty { background: #e6f4ea; color: #137333; }
    .type-pct { background: #fef7e0; color: #b06000; }
    .step-name { flex: 1; font-size: 13px; color: #333; }
    .step-assignees-text { font-size: 11px; color: #888; max-width: 120px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    /* 단계/단위업무 추가 폼 */
    .add-form { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; padding-top: 8px; margin-top: 4px; border-top: 1px dashed #e0e0e0; }
    .add-input { flex: 1; min-width: 120px; border: 1.5px solid #e0e0e0; border-radius: 6px; padding: 6px 10px; font-size: 13px; font-family: inherit; color: #333; }
    .add-input:focus { outline: none; border-color: #1a73e8; }
    .add-select { border: 1.5px solid #e0e0e0; border-radius: 6px; padding: 6px 8px; font-size: 12px; font-family: inherit; background: #fff; }
    .add-select:focus { outline: none; border-color: #1a73e8; }
    .qty-input { width: 64px; border: 1.5px solid #e0e0e0; border-radius: 6px; padding: 6px 8px; font-size: 12px; text-align: center; font-family: inherit; }
    .qty-input:focus { outline: none; border-color: #1a73e8; }

    /* 단위업무 추가 row */
    .add-task-row { display: flex; gap: 8px; padding: 10px 20px 14px; align-items: center; }

    /* 직원 관리 */
    .user-card { background: #fff; border-radius: 10px; border: 1.5px solid #e8e8e8; padding: 14px 18px; margin-bottom: 10px; }
    .user-card-top { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
    .user-card-bottom { display: flex; align-items: center; gap: 8px; padding-top: 10px; border-top: 0.5px solid #f0f0f0; flex-wrap: wrap; }
    .user-avatar { width: 38px; height: 38px; border-radius: 50%; background: #e8f0fe; display: flex; align-items: center; justify-content: center; font-size: 15px; font-weight: 700; color: #1a73e8; flex-shrink: 0; }
    .user-info { flex: 1; min-width: 0; }
    .user-name { font-size: 14px; font-weight: 700; color: #1a1a1a; }
    .user-sub { font-size: 12px; color: #888; margin-top: 2px; overflow: hidden; text-overflow: ellipsis; }
    .level-badge { font-size: 11px; padding: 2px 8px; border-radius: 20px; font-weight: 700; white-space: nowrap; flex-shrink: 0; }
    .level-1 { background: #fce8e6; color: #c5221f; }
    .level-2 { background: #fef7e0; color: #b06000; }
    .level-3 { background: #e6f4ea; color: #137333; }
    .level-4 { background: #e8f0fe; color: #1a73e8; }

    /* 직원 추가 폼 */
    .add-user-card { background: #fff; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.07); padding: 20px; margin-bottom: 16px; }
    .add-user-card h3 { font-size: 14px; font-weight: 700; color: #555; margin-bottom: 14px; }
    .add-user-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }

    /* 모달 */
    .modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.4); z-index: 100; align-items: center; justify-content: center; }
    .modal-overlay.show { display: flex; }
    .modal { background: #fff; border-radius: 12px; padding: 28px; width: 440px; max-width: 90vw; }
    .modal h3 { font-size: 15px; font-weight: 700; margin-bottom: 16px; }
    .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }

    /* 토스트 */
    .toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(20px); background: #333; color: #fff; padding: 10px 24px; border-radius: 24px; font-size: 13px; opacity: 0; transition: all 0.3s; pointer-events: none; white-space: nowrap; z-index: 200; }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    .color-0{background:#4285f4} .color-1{background:#34a853} .color-2{background:#ea4335} .color-3{background:#fbbc04} .color-4{background:#9c27b0}
    .badge-0{background:#e8f0fe;color:#1a73e8} .badge-1{background:#e6f4ea;color:#137333} .badge-2{background:#fce8e6;color:#c5221f} .badge-3{background:#fef7e0;color:#b06000} .badge-4{background:#f3e5f5;color:#6a1b9a}
  </style>
</head>
<body>

<div class="topbar">
  <div class="topbar-title">⚙️ 관리자</div>
  <div class="tab active" onclick="showPage('projects')">프로젝트 관리</div>
  <div class="tab" onclick="showPage('users')">직원 관리</div>
  <a class="tab" href="/dashboard" style="text-decoration:none">대시보드</a>
  <div class="topbar-right">
    <span class="topbar-user" id="topbar-user"></span>
    <button class="btn-topbar" onclick="location.href='/report'">← 보고 폼</button>
    <button class="btn-topbar" onclick="doLogout()">로그아웃</button>
  </div>
</div>

<!-- 프로젝트 관리 -->
<div class="page active" id="page-projects">
  <div style="display:flex;justify-content:flex-end;margin-bottom:12px">
    <button class="btn btn-green" onclick="showAddProjectModal()">+ 프로젝트 추가</button>
  </div>
  <div id="project-list"></div>
</div>

<!-- 직원 관리 -->
<div class="page" id="page-users">
  <div class="add-user-card">
    <h3>+ 직원 추가</h3>
    <div class="add-user-grid">
      <div class="field"><div class="field-label">이름 *</div><input class="field-input" id="u-name" placeholder="홍길동"></div>
      <div class="field"><div class="field-label">이메일 *</div><input class="field-input" id="u-email" placeholder="hong@sungwoobook.com"></div>
      <div class="field"><div class="field-label">비밀번호 *</div><input class="field-input" id="u-pw" type="password" placeholder="초기 비밀번호"></div>
      <div class="field"><div class="field-label">직급</div>
        <select class="field-input add-select" id="u-position">
          <option value="팀원">팀원 (레벨 4)</option>
          <option value="팀장">팀장 (레벨 3)</option>
          <option value="이사">이사 (레벨 2)</option>
          <option value="대표이사">대표이사 (레벨 1)</option>
          <option value="회장">회장 (레벨 1)</option>
        </select>
      </div>
      <div class="field"><div class="field-label">사업부</div><input class="field-input" id="u-division" placeholder="초등콘텐츠사업부"></div>
      <div class="field"><div class="field-label">팀</div><input class="field-input" id="u-team" placeholder="솔루션개발팀"></div>
    </div>
    <div style="display:flex;justify-content:flex-end">
      <button class="btn btn-blue" onclick="addUser()">추가</button>
    </div>
  </div>
  <div id="user-list"></div>
</div>

<!-- 프로젝트 추가 모달 -->
<div class="modal-overlay" id="add-project-modal">
  <div class="modal">
    <h3>+ 새 프로젝트 추가</h3>
    <div class="add-user-grid">
      <div class="field"><div class="field-label">프로젝트명 *</div><input class="field-input" id="m-name" placeholder="예: 유아사업 진출"></div>
      <div class="field"><div class="field-label">태그 *</div><input class="field-input" id="m-tag" placeholder="예: 신규사업"></div>
      <div class="field"><div class="field-label">사업부</div><input class="field-input" id="m-division" placeholder="초등콘텐츠사업부"></div>
      <div class="field"><div class="field-label">팀명</div><input class="field-input" id="m-team" placeholder="솔루션개발팀"></div>
      <div class="field"><div class="field-label">책임자</div><input class="field-input" id="m-manager" placeholder="함흥우"></div>
      <div class="field"><div class="field-label">시작일</div><input class="field-input" id="m-start" type="date"></div>
      <div class="field" style="grid-column:1/-1"><div class="field-label">목표완료일</div><input class="field-input" id="m-target" type="date"></div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-gray" onclick="hideAddProjectModal()">취소</button>
      <button class="btn btn-green" onclick="addProject()">추가</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  let projectData = [];
  let userData = [];
  let currentUser = null;

  const LEVEL_MAP = { '대표이사': 1, '회장': 1, '이사': 2, '팀장': 3, '팀원': 4 };
  const LEVEL_LABEL = { 1: '경영진', 2: '이사', 3: '팀장', 4: '팀원' };

  async function init() {
    const res = await fetch('/api/me');
    const data = await res.json();
    if (!data.user) { location.href = '/login'; return; }
    currentUser = data.user;
    document.getElementById('topbar-user').textContent = `${currentUser.name} (${currentUser.position || '관리자'})`;
    await loadProjects();
    await loadUsers();

    // URL 쿼리로 탭 자동 선택 (?tab=users 등)
    const params = new URLSearchParams(window.location.search);
    const tab = params.get('tab');
    if (tab) showPage(tab);
  }

  async function loadProjects() {
    const res = await fetch('/api/projects/all');
    const data = await res.json();
    projectData = data.projects;
    renderProjects();
  }

  async function loadUsers() {
    const res = await fetch('/api/users');
    const data = await res.json();
    userData = data.users;
    renderUsers();
  }

  function showPage(page) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.getElementById(`page-${page}`).classList.add('active');
    event.target.classList.add('active');
  }

  // ── 프로젝트 렌더링 ─────────────────────────────────

  function renderProjects() {
    const container = document.getElementById('project-list');
    container.innerHTML = '';
    projectData.forEach((project, pi) => {
      const prog = calcProjectProgress(project);
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <div class="card-header" onclick="toggleProject('${project.id}')">
          <div class="dot color-${pi % 5}"></div>
          <div class="card-title">
            <div class="card-name">${project.name}</div>
            <div class="card-meta">${project.division||''} · ${project.team||''} · 책임자: ${project.manager||'-'}</div>
          </div>
          <span class="badge badge-${pi % 5}">${project.tag}</span>
          <span class="progress-text">${prog}%</span>
          <span class="arrow open" id="arrow-${project.id}">▶</span>
        </div>
        <div class="card-body open" id="body-${project.id}">
          <div class="info-grid">
            <div class="field"><div class="field-label">프로젝트명</div><input class="field-input" id="fi-name-${project.id}" value="${project.name}"></div>
            <div class="field"><div class="field-label">태그</div><input class="field-input" id="fi-tag-${project.id}" value="${project.tag}"></div>
            <div class="field"><div class="field-label">사업부</div><input class="field-input" id="fi-division-${project.id}" value="${project.division||''}"></div>
            <div class="field"><div class="field-label">팀명</div><input class="field-input" id="fi-team-${project.id}" value="${project.team||''}"></div>
            <div class="field"><div class="field-label">책임자</div><input class="field-input" id="fi-manager-${project.id}" value="${project.manager||''}"></div>
            <div class="field"><div class="field-label">시작일</div><input class="field-input" id="fi-start-${project.id}" type="date" value="${project.startDate||''}"></div>
            <div class="field"><div class="field-label">목표완료일</div><input class="field-input" id="fi-target-${project.id}" type="date" value="${project.targetDate||''}"></div>
          </div>
          <div class="action-row">
            <button class="btn btn-red" onclick="deleteProject('${project.id}')">삭제</button>
            <button class="btn btn-blue" onclick="saveProjectInfo('${project.id}')">저장</button>
          </div>
        </div>
        <div class="task-section" id="tasks-${project.id}">
          <div class="section-title">단위업무 (${project.tasks.length}개)</div>
          <div id="tasklist-${project.id}">
            ${project.tasks.map(t => renderTaskBlock(t, project.id)).join('')}
          </div>
          <div class="add-task-row">
            <input class="add-input" id="newtask-${project.id}" placeholder="단위업무명 입력..." onkeydown="if(event.key==='Enter') addTask('${project.id}')">
            <button class="btn btn-blue" onclick="addTask('${project.id}')">+ 추가</button>
          </div>
        </div>
      `;
      container.appendChild(card);
    });
  }

  function renderTaskBlock(task, projectId) {
    const assignees = task.assignees || [];
    const prog = calcTaskProgress(task);
    const stepsHtml = (task.steps || []).map(step => {
      const stepAssignees = step.assignees || [];
      const badge = step.type === 'check' ? '체크' : step.type === 'qty' ? '수량' : '비율';
      const badgeClass = `type-${step.type}`;
      const extra = step.type === 'qty' ? ` (목표 ${step.target}개)` : '';
      return `
        <div class="step-row" id="steprow-${step.id}">
          <span class="step-type-badge ${badgeClass}">${badge}</span>
          <span class="step-name">${step.name}${extra}</span>
          <span class="step-assignees-text">${stepAssignees.length ? stepAssignees.join(', ') : '전체'}</span>
          <button class="btn-sm" onclick="editStepAssignees('${projectId}','${task.id}','${step.id}')">담당자</button>
          <button class="btn-sm" onclick="deleteStep('${projectId}','${task.id}','${step.id}')">✕</button>
        </div>`;
    }).join('');

    return `
      <div class="task-block" id="taskblock-${task.id}">
        <div class="task-block-header" onclick="toggleTask('${task.id}')">
          <span class="task-block-name">${task.name}</span>
          <span class="task-assignees">${assignees.length ? assignees.join(', ') : '전체공개'}</span>
          <span class="task-progress">${prog}%</span>
          <button class="btn-sm" onclick="event.stopPropagation(); editTaskAssignees('${projectId}','${task.id}')">담당자</button>
          <button class="btn-sm" onclick="event.stopPropagation(); deleteTask('${projectId}','${task.id}')">✕</button>
          <span class="task-arrow open" id="taskarrow-${task.id}">▶</span>
        </div>
        <div class="task-body open" id="taskbody-${task.id}">
          <div class="step-list">${stepsHtml}</div>
          <div class="add-form">
            <select class="add-select" id="steptype-${task.id}" onchange="toggleQtyInput('${task.id}')">
              <option value="check">체크형</option>
              <option value="qty">수량형</option>
              <option value="pct">비율형</option>
            </select>
            <input class="add-input" id="stepname-${task.id}" placeholder="단계명 입력..." onkeydown="if(event.key==='Enter') addStep('${projectId}','${task.id}')">
            <input class="qty-input" id="steptarget-${task.id}" placeholder="목표수" type="number" min="1" style="display:none">

  // ── 진행률 ──────────────────────────────────────────

  function calcTaskProgress(task) {
    const steps = task.steps || [];
    if (!steps.length) return 0;
    const total = steps.reduce((s, step) => {
      if (step.type === 'check') return s + (step.done ? 100 : 0);
      if (step.type === 'qty') return s + (step.target > 0 ? Math.min(100, Math.round((step.current||0)/step.target*100)) : 0);
      if (step.type === 'pct') return s + (step.pct || 0);
      return s;
    }, 0);
    return Math.round(total / steps.length);
  }

  function calcProjectProgress(project) {
    const tasks = project.tasks || [];
    if (!tasks.length) return 0;
    return Math.round(tasks.reduce((s, t) => s + calcTaskProgress(t), 0) / tasks.length);
  }

  async function saveReportsTo(userId) {
    const checked = [...document.querySelectorAll('#reports-modal input[type=checkbox]:checked')].map(el => el.value);
    const res = await fetch('/api/users/reportsTo', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ userId, reportsTo: checked }),
    });
    if (res.ok) {
      document.getElementById('reports-modal').remove();
      showToast('보고 대상이 저장되었습니다.');
      loadUsers();
    } else {
      alert('저장 실패');
    }
  }

  // ─── 관리자 권한 범위 설정 모달 ────────────────────────────
  function openScopeModal(userId, userName) {
    const targetUser = userData.find(u => u.id === userId);
    const currentScope = targetUser?.adminScope || 'system';
    const currentTeams = targetUser?.managedTeams || [];
    // 전 직원의 team 값에서 고유 팀 목록 추출
    const allTeams = [...new Set(userData.flatMap(u => (u.team||'').split(',').map(t=>t.trim()).filter(Boolean)))];

    const modalHtml = `
      <div id="scope-modal" style="position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:1000;display:flex;align-items:center;justify-content:center;">
        <div style="background:#fff;border-radius:14px;padding:28px;width:440px;max-width:90vw;box-shadow:0 8px 32px rgba(0,0,0,0.15);">
          <div style="font-size:16px;font-weight:600;color:#1a1a2e;margin-bottom:6px;">${userName}님의 관리자 권한 범위</div>
          <div style="font-size:12px;color:#888;margin-bottom:18px;">권한 범위를 선택하세요.</div>

          <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:16px;">
            <label style="display:flex;align-items:center;gap:10px;padding:10px 14px;background:#f8f9fa;border-radius:8px;border:0.5px solid #e8e8e8;cursor:pointer;">
              <input type="radio" name="scope-radio" value="system" ${currentScope==='system'?'checked':''} onchange="toggleScopeTeams(false)">
              <span style="font-size:13px;font-weight:500;">시스템관리자 — 전사 전체 관리</span>
            </label>
            <label style="display:flex;align-items:center;gap:10px;padding:10px 14px;background:#f8f9fa;border-radius:8px;border:0.5px solid #e8e8e8;cursor:pointer;">
              <input type="radio" name="scope-radio" value="division" ${currentScope==='division'?'checked':''} onchange="toggleScopeTeams(true)">
              <span style="font-size:13px;font-weight:500;">운영관리자(이사급) — 담당 팀 여러 개 멀티 관리</span>
            </label>
            <label style="display:flex;align-items:center;gap:10px;padding:10px 14px;background:#f8f9fa;border-radius:8px;border:0.5px solid #e8e8e8;cursor:pointer;">
              <input type="radio" name="scope-radio" value="team" ${currentScope==='team'?'checked':''} onchange="toggleScopeTeams(true)">
              <span style="font-size:13px;font-weight:500;">운영관리자(팀장급) — 본인 팀만 관리</span>
            </label>
          </div>

          <div id="scope-teams-box" style="display:${currentScope!=='system'?'block':'none'};margin-bottom:18px;">
            <div style="font-size:12px;font-weight:500;color:#666;margin-bottom:8px;">담당 팀 선택 (이사급은 복수 선택 가능)</div>
            <div style="display:flex;flex-direction:column;gap:6px;max-height:160px;overflow-y:auto;">
              ${allTeams.map(t => `
                <label style="display:flex;align-items:center;gap:8px;padding:7px 10px;background:#fff;border:0.5px solid #e8e8e8;border-radius:6px;cursor:pointer;">
                  <input type="checkbox" class="scope-team-chk" value="${t}" ${currentTeams.includes(t)?'checked':''}>
                  <span style="font-size:12px;">${t}</span>
                </label>`).join('')}
            </div>
          </div>

          <div style="display:flex;gap:8px;">
            <button onclick="document.getElementById('scope-modal').remove()" style="flex:1;padding:10px;border:1px solid #ddd;border-radius:8px;background:#fff;font-size:13px;cursor:pointer;color:#666;">취소</button>
            <button onclick="saveAdminScope('${userId}')" style="flex:1;padding:10px;border:none;border-radius:8px;background:#f59e0b;color:#fff;font-size:13px;cursor:pointer;font-weight:500;">저장</button>
          </div>
        </div>
      </div>`;
    document.body.insertAdjacentHTML('beforeend', modalHtml);
  }

  function toggleScopeTeams(show) {
    document.getElementById('scope-teams-box').style.display = show ? 'block' : 'none';
  }

  async function saveAdminScope(userId) {
    const scope = document.querySelector('input[name="scope-radio"]:checked').value;
    const managedTeams = scope === 'system' ? [] : [...document.querySelectorAll('.scope-team-chk:checked')].map(el => el.value);

    if (scope !== 'system' && managedTeams.length === 0) {
      alert('운영관리자는 담당 팀을 1개 이상 선택해야 합니다.');
      return;
    }

    const res = await fetch('/api/users/adminScope', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ userId, adminScope: scope, managedTeams }),
    });
    if (res.ok) {
      document.getElementById('scope-modal').remove();
      showToast('권한 범위가 저장되었습니다.');
      loadUsers();
    } else {
      const err = await res.json();
      alert('저장 실패: ' + (err.error || ''));
    }
  }

  async function toggleAdmin(userId, currentIsAdmin) {
    const action = currentIsAdmin ? '관리자 권한을 해제' : '관리자 권한을 부여';
    if (!confirm(`이 직원에게 ${action}하시겠습니까?`)) return;
    const res = await fetch('/api/users/admin', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ userId, isAdmin: !currentIsAdmin })
    });
    if (res.ok) {
      showToast(currentIsAdmin ? '관리자 권한이 해제되었습니다.' : '관리자 권한이 부여되었습니다.');
      loadUsers();
    } else {
      alert('권한 변경 실패');
    }
  }

  async function changeLevel(email, level) {
    const res = await fetch('/api/users/level', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, level: parseInt(level) })
    });
    if (res.ok) {
      showToast('레벨이 변경되었습니다.');
      loadUsers();
    } else {
      alert('레벨 변경 실패');
    }
  }

  async function addUser() {
    const name = document.getElementById('u-name').value.trim();
    const email = document.getElementById('u-email').value.trim();
    const pw = document.getElementById('u-pw').value;
    const position = document.getElementById('u-position').value;
    const level = LEVEL_MAP[position] || 4;
    const division = document.getElementById('u-division').value.trim();
    const team = document.getElementById('u-team').value.trim();
    if (!name || !email || !pw) { alert('이름, 이메일, 비밀번호는 필수입니다.'); return; }
    const res = await fetch('/api/users/add', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ name, email, password: pw, position, level, division, team, role: position }) });
    const result = await res.json();
    if (result.success) { await loadUsers(); ['u-name','u-email','u-pw','u-division','u-team'].forEach(id => document.getElementById(id).value=''); showToast(`${name} 추가됨`); }
    else alert(result.error || '오류 발생');
  }

  async function deleteUser(userId, name) {
    if (!confirm(`${name}을(를) 삭제할까요?`)) return;
    const res = await fetch('/api/users/delete', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ userId }) });
    const result = await res.json();
    if (result.success) { await loadUsers(); showToast('삭제됐습니다'); }
  }

  async function resetPassword(userId) {
    const pw = prompt('새 비밀번호를 입력하세요:');
    if (!pw) return;
    const res = await fetch('/api/users/password', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ userId, newPassword: pw }) });
    const result = await res.json();
    if (result.success) showToast('비밀번호 변경됨');
  }

  async function doLogout() {
    await fetch('/api/logout', { method: 'POST' });
    location.href = '/login';
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  init();
</script>

<!-- 담당자 편집 모달 -->
<div class="modal-overlay" id="assignee-modal">
  <div class="modal">
    <h3 id="assignee-modal-title">담당자 설정</h3>
    <div id="assignee-modal-body"></div>
    <div class="modal-actions">
      <button class="btn btn-gray" onclick="hideAssigneeModal()">취소</button>
      <button class="btn btn-blue" onclick="saveAssignees()">저장</button>
    </div>
  </div>
</div>

</body>
</html>
