<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>연간보고</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Malgun Gothic',sans-serif;background:#f5f6fa;color:#1a1a2e;}
.topbar{background:#1e1e2e;display:flex;align-items:center;gap:14px;padding:0 24px;height:52px;position:sticky;top:0;z-index:100;}
.topbar-title{color:#fff;font-size:15px;font-weight:600;}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:8px;}
.topbar-user{color:rgba(255,255,255,0.8);font-size:13px;}
.btn-topbar{background:rgba(255,255,255,0.15);color:#fff;border:none;padding:6px 12px;border-radius:6px;font-size:12px;cursor:pointer;font-family:inherit;}
.btn-topbar:hover{background:rgba(255,255,255,0.25);}
.wrap{max-width:720px;margin:0 auto;padding:24px 16px 48px;}
.card{background:#fff;border-radius:12px;border:0.5px solid #e8e8e8;padding:20px 24px;margin-bottom:14px;}
.section-title{font-size:15px;font-weight:500;color:#1a1a2e;margin:0 0 14px;}
.year-select{padding:8px 12px;border:0.5px solid #ddd;border-radius:8px;font-size:13px;font-family:inherit;color:#1a1a2e;background:#fff;cursor:pointer;min-width:120px;outline:none;}

.summary-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px;}
.s-card{background:#f8f9fa;border-radius:10px;border:0.5px solid #e8e8e8;padding:14px;text-align:center;}
.s-num{font-size:24px;font-weight:500;color:#1e1e2e;margin:4px 0;}
.s-label{font-size:11px;color:#aaa;}
.q-block{border:0.5px solid #e8e8e8;border-radius:8px;overflow:hidden;margin-bottom:10px;}
.q-header{background:#f8f9fa;padding:10px 14px;display:flex;align-items:center;gap:8px;border-bottom:0.5px solid #e8e8e8;}
.q-label{font-size:13px;font-weight:500;color:#1a1a2e;flex:1;}
.q-weeks{font-size:11px;color:#aaa;}
.q-body{padding:12px 14px;font-size:12px;color:#555;line-height:1.8;}
.ai-box{width:100%;background:#f8f9fa;border-radius:8px;border:0.5px solid #e8e8e8;padding:14px;font-size:13px;line-height:1.9;color:#222;min-height:120px;resize:vertical;font-family:inherit;outline:none;}
.ai-box:focus{border-color:#1e1e2e;background:#fff;}
.ai-hint{font-size:11px;color:#aaa;margin-bottom:8px;}
.send-btn{width:100%;padding:13px;background:#1e1e2e;color:#fff;font-size:14px;font-weight:500;border:none;border-radius:10px;cursor:pointer;font-family:inherit;}
.send-btn:hover{background:#111;}
.send-btn:disabled{background:#ccc;cursor:not-allowed;}
.empty{text-align:center;padding:40px;color:#bbb;font-size:13px;}
.dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:#1e1e2e;animation:blink 1s infinite;}
.dot:nth-child(2){animation-delay:0.2s;} .dot:nth-child(3){animation-delay:0.4s;}
@keyframes blink{0%,100%{opacity:0.2;}50%{opacity:1;}}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px 20px;border-radius:8px;font-size:13px;display:none;z-index:999;}
</style>
</head>
<body>
<div class="topbar">
  <span class="topbar-title">📈 연간보고</span>
  <div class="topbar-right">
    <span class="topbar-user" id="topbar-user"></span>
    <button class="btn-topbar" onclick="location.href='/report'">← 보고 폼</button>
    <button class="btn-topbar" onclick="location.href='/quarterly'">분기보고</button>
    <button class="btn-topbar" onclick="logout()">로그아웃</button>
  </div>
</div>

<div class="wrap">
  <div class="card">
    <div class="section-title">연도 선택</div>
    <select class="year-select" id="year-selector" onchange="selectYear(Number(this.value))"></select>
  </div>
  <div id="main-content">
    <div class="empty">연도를 선택해주세요.</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let currentUser = null;
let currentData = null;
let aiSummary = '';
const thisYear = new Date().getFullYear();
let selectedYear = thisYear;

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 2500);
}

async function init() {
  const res = await fetch('/api/me');
  const data = await res.json();
  if (!data.user) { location.href = '/login'; return; }
  currentUser = data.user;
  document.getElementById('topbar-user').textContent = `${currentUser.name} (${currentUser.position || '팀원'})`;
  renderYearSelector();
  await loadData();
}

function renderYearSelector() {
  const sel = document.getElementById('year-selector');
  let html = '';
  for (let y = thisYear; y >= thisYear - 9; y--) {
    const selected = y === selectedYear ? 'selected' : '';
    html += `<option value="${y}" ${selected}>${y}년</option>`;
  }
  sel.innerHTML = html;
}

async function selectYear(y) {
  selectedYear = y;
  await loadData();
}

async function loadData() {
  document.getElementById('main-content').innerHTML = `<div class="empty"><div style="display:flex;justify-content:center;gap:5px;margin-bottom:8px;"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>데이터 불러오는 중...</div>`;
  const res = await fetch(`/api/annual-data?year=${selectedYear}`);
  currentData = await res.json();
  renderPage();
  if ((currentData.quarterlyRecords || []).length > 0) generateAiSummary();
}

function renderPage() {
  const { quarterlyRecords } = currentData;
  if (!quarterlyRecords || quarterlyRecords.length === 0) {
    document.getElementById('main-content').innerHTML = `
      <div class="card"><div class="empty">${selectedYear}년 분기보고 데이터가 없습니다.<br><small style="color:#bbb;margin-top:6px;display:block;">분기보고를 먼저 발송하면 자동으로 집계됩니다.</small></div></div>`;
    return;
  }
  const totalWeeks = quarterlyRecords.reduce((s, r) => s + (r.weeklyRecords || []).length, 0);

  const qBlocks = quarterlyRecords.map(r => `
    <div class="q-block">
      <div class="q-header">
        <span class="q-label">${r.year}년 ${r.quarter}분기</span>
        <span class="q-weeks">${(r.weeklyRecords||[]).length}주 · ${(r.weeklyRecords||[]).reduce((s,w)=>s+(w.weeklyDays||[]).length,0)}일</span>
      </div>
      <div class="q-body">${(r.aiSummary||'요약 없음').replace(/\n/g,'<br>')}</div>
    </div>`).join('');

  document.getElementById('main-content').innerHTML = `
    <div class="card">
      <div class="summary-grid">
        <div class="s-card"><div class="s-label">보고 분기</div><div class="s-num">${quarterlyRecords.length}</div><div class="s-label">분기</div></div>
        <div class="s-card"><div class="s-label">총 보고 주수</div><div class="s-num">${totalWeeks}</div><div class="s-label">주</div></div>
        <div class="s-card"><div class="s-label">보고 연도</div><div class="s-num">${selectedYear}</div><div class="s-label">년</div></div>
      </div>
    </div>
    <div class="card">
      <div class="section-title">분기별 성과 요약</div>
      ${qBlocks}
    </div>
    <div class="card">
      <div class="section-title">✨ AI 연간 요약</div>
      <p class="ai-hint">AI가 작성한 초안입니다. 직접 수정 후 발송하세요.</p>
      <textarea class="ai-box" id="ai-summary-box" placeholder="AI 요약 생성 중..."></textarea>
    </div>
    <div class="card">
      <button class="send-btn" id="send-btn" onclick="sendReport()">📨 ${selectedYear}년 연간보고 발송</button>
    </div>`;
}

async function generateAiSummary() {
  try {
    const res = await fetch('/api/gpt-annual', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ year: selectedYear, quarterlyRecords: currentData.quarterlyRecords, user: currentUser }),
    });
    const data = await res.json();
    aiSummary = data.summary || '';
    const box = document.getElementById('ai-summary-box');
    if (box) box.value = aiSummary;
  } catch (e) {
    const box = document.getElementById('ai-summary-box');
    if (box) box.placeholder = 'AI 요약 생성 실패. 직접 입력해주세요.';
  }
}

async function sendReport() {
  const btn = document.getElementById('send-btn');
  btn.disabled = true; btn.textContent = '발송 중...';
  try {
    const res = await fetch('/api/annual-send', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        year: selectedYear,
        quarterlyRecords: currentData.quarterlyRecords,
        aiSummary: document.getElementById('ai-summary-box')?.value || aiSummary,
      }),
    });
    if (res.ok) { showToast('✅ 연간보고 발송 완료!'); btn.textContent = '✅ 발송 완료'; }
    else { const e = await res.json(); alert('발송 실패: ' + e.error); btn.disabled = false; btn.textContent = '📨 발송'; }
  } catch (e) { alert('오류 발생'); btn.disabled = false; btn.textContent = '📨 발송'; }
}

function logout() { fetch('/logout', { method: 'POST' }).then(() => location.href = '/login'); }
init();
</script>
</body>
</html>
